<div class="dashboard-runtime-summary">
  <div class="kv-grid">
    <div class="kv-grid-label">Housekeeping Enabled</div><div><span class="badge" data-status="{housekeeping_enabled}">{housekeeping_enabled}</span></div>
    <div class="kv-grid-label">Housekeeping Schedule</div><div><code>{housekeeping_schedule}</code> ({housekeeping_days} at {housekeeping_time})</div>
    <div class="kv-grid-label">Next Housekeeping Run</div><div>{next_housekeeping_run}</div>
    <div class="kv-grid-label">Log Retention Days</div><div>{log_retention_days}</div>
  </div>
</div>
