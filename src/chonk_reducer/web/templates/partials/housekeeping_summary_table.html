    <tr><th style="text-align: left; border-bottom: 1px solid #ddd; padding: 0.35rem;">Housekeeping Schedule</th><td style="border-bottom: 1px solid #ddd; padding: 0.35rem;"><code>{housekeeping_schedule}</code> ({housekeeping_days} at {housekeeping_time})</td></tr>
    <tr><th style="text-align: left; border-bottom: 1px solid #ddd; padding: 0.35rem;">Next Housekeeping Run</th><td style="border-bottom: 1px solid #ddd; padding: 0.35rem;">{next_housekeeping_run}</td></tr>
    <tr><th style="text-align: left; padding: 0.35rem;">Log Retention Days</th><td style="padding: 0.35rem;">{log_retention_days}</td></tr>
