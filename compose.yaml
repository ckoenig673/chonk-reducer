name: nas-transcoder

x-runtime-env: &runtime-env
  CHONK_SECRET_KEY: ${CHONK_SECRET_KEY}
  PYTHONPATH: /project/src
  PYTHONPYCACHEPREFIX: /work/pycache
  PYTHONDONTWRITEBYTECODE: 1
  STATS_ENABLED: "true"
  APP_VERSION: "v1.42.0"
  WORK_ROOT: /work
  STATS_PATH: /config/chonk.db
  TZ: America/Chicago

services:
  chonk-service:
    build: .
    container_name: chonk-service
    entrypoint: ["/usr/bin/python3", "-m", "chonk_reducer"]
    environment:
      <<: *runtime-env
      SERVICE_MODE: "true"
      SERVICE_HOST: "0.0.0.0"
      SERVICE_PORT: "8080"
    volumes:
      - /volume1/movies:/movies:rw
      - /volume1/tv_shows:/tv_shows:rw
      - /volume1/data/transcodework:/work:rw
      - /volume1/docker/projects/nas-transcoder:/config:rw
      - /volume1/docker/projects/nas-transcoder:/project:ro
      - /usr/share/zoneinfo/America/Chicago:/etc/localtime:ro
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "937"
    ports:
      - "8085:8080"
    restart: unless-stopped
